<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">SQL Viewer</title>
  <desc id="desc">A dark app-style hero showing a read-only SQLite database inspector with objects, schema, and rows.</desc>
  <rect width="1400" height="420" fill="#14171a"/>
  <rect x="48" y="48" width="1304" height="324" rx="18" fill="#1f2428" stroke="#3a424b"/>
  <rect x="48" y="48" width="1304" height="52" rx="18" fill="#2a3036"/>
  <circle cx="82" cy="74" r="8" fill="#ff5f57"/>
  <circle cx="108" cy="74" r="8" fill="#ffbd2e"/>
  <circle cx="134" cy="74" r="8" fill="#28c840"/>
  <text x="82" y="164" fill="#f7fafc" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="780">SQL Viewer</text>
  <text x="84" y="206" fill="#aab4bf" font-family="Inter, Arial, sans-serif" font-size="20">Read-only SQLite inspection inside your vault</text>
  <g transform="translate(84 248)" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
    <rect width="114" height="34" rx="8" fill="#143124" stroke="#2e7356"/>
    <text x="23" y="23" fill="#68e29d">Read-only</text>
    <rect x="126" width="78" height="34" rx="8" fill="#252b31" stroke="#454e58"/>
    <text x="150" y="23" fill="#d8dee6">.db</text>
    <rect x="216" width="96" height="34" rx="8" fill="#252b31" stroke="#454e58"/>
    <text x="235" y="23" fill="#d8dee6">.sqlite</text>
    <rect x="324" width="102" height="34" rx="8" fill="#252b31" stroke="#454e58"/>
    <text x="343" y="23" fill="#d8dee6">.sqlite3</text>
  </g>
  <g transform="translate(650 112)">
    <rect width="650" height="244" rx="12" fill="#10161d" stroke="#3a424b"/>
    <rect x="22" y="22" width="164" height="200" rx="9" fill="#1b2229" stroke="#2f3943"/>
    <text x="40" y="52" fill="#f7fafc" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="760">Objects</text>
    <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
      <rect x="40" y="74" width="128" height="28" rx="7" fill="#17385d"/>
      <text x="52" y="93" fill="#9bd2ff">table</text>
      <text x="98" y="93" fill="#f7fafc">events</text>
      <rect x="40" y="110" width="128" height="28" rx="7" fill="#162b23"/>
      <text x="52" y="129" fill="#71e0a3">view</text>
      <text x="92" y="129" fill="#f7fafc">recent</text>
      <rect x="40" y="146" width="128" height="28" rx="7" fill="#342912"/>
      <text x="52" y="165" fill="#f3c26b">index</text>
      <text x="100" y="165" fill="#f7fafc">idx_time</text>
    </g>
    <rect x="208" y="22" width="414" height="74" rx="9" fill="#1b2229" stroke="#2f3943"/>
    <text x="230" y="52" fill="#f7fafc" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="760">Schema</text>
    <text x="230" y="78" fill="#aab4bf" font-family="Menlo, Consolas, monospace" font-size="14">id INTEGER PK  |  label TEXT  |  created_at TEXT</text>
    <rect x="208" y="112" width="414" height="110" rx="9" fill="#0c1117" stroke="#2f3943"/>
    <rect x="208" y="112" width="414" height="34" rx="9" fill="#28313a"/>
    <g fill="#dbe4ec" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">
      <text x="230" y="134">id</text>
      <text x="296" y="134">label</text>
      <text x="430" y="134">created_at</text>
    </g>
    <g fill="#f1e276" font-family="Menlo, Consolas, monospace" font-size="14">
      <text x="230" y="170">1</text><text x="296" y="170">capture</text><text x="430" y="170">2026-06-08</text>
      <text x="230" y="202">2</text><text x="296" y="202">review</text><text x="430" y="202">2026-06-08</text>
    </g>
  </g>
</svg>
